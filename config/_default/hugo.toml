# -- Site Configuration --
# Refer to the theme docs for more details about each of these parameters.
# https://blowfish.page/docs/gettinpx blowfish-toolsng-started/

baseURL = "https://juju.casa/"
defaultContentLanguage = "en"
enableRobotsTXT = true
uglyURLs = false

[permalinks]
  posts = "/:filename/" # Or use "/:sections/:filename/" depending on how nested they are

[pagination]
pagerSize = 11

summaryLength = 0

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "category"

[module]
[[module.imports]]
  path = "github.com/nunocoracao/blowfish/v2"
  disable = false

pluralizeListTitles = false # hugo function useful for non-english languages, find out more in  https://gohugo.io/getting-started/configuration/#pluralizelisttitles
buildDrafts = false
buildFuture = false
ShowLanguageSwitcher = false
enableEmoji = true

# googleAnalytics = "G-XXXXXXXXX"

[imaging]
  anchor = 'Center'

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

[related]
  threshold = 0
  toLower = false

    [[related.indices]]
        name = "tags"
        weight = 100

    [[related.indices]]
        name = "categories"
        weight = 100

    [[related.indices]]
        name = "series"
        weight = 50

    [[related.indices]]
        name = "authors"
        weight = 20

    [[related.indices]]
        name = "date"
        weight = 10

    [[related.indices]]
      applyFilter = false
      name = 'fragmentrefs'
      type = 'fragments'
      weight = 10

[services]
  [services.disqus]
    shortname = 'casa-de-juju'

